<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Panache Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a2332 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .brand h2 {
            color: #1a2332;
            font-weight: 700;
        }
        .login-card .brand p {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .login-card .form-control {
            border-radius: 8px;
            padding: 12px 15px;
        }
        .login-card .btn-primary {
            background: #1a2332;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }
        .login-card .btn-primary:hover {
            background: #2c3e50;
        }
        .login-card .alert {
            border-radius: 8px;
            font-size: 0.9rem;
        }
        @media (max-width: 575px) {
            .login-card { padding: 25px 20px; margin: 15px; max-width: 100%; }
            .login-card .brand h2 { font-size: 1.3rem; }
            .login-card .brand p { font-size: 0.8rem; }
            .login-card .form-control { padding: 10px 12px; font-size: 0.9rem; }
            .login-card .btn-primary { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="fas fa-tooth" style="font-size: 2.5rem; color: #1a2332;"></i>
            <h2>Admin Panel</h2>
            <p>Panache Dental & Facial Aesthetics Clinic</p>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('home') }}" class="text-decoration-none" style="color: #6c757d; font-size: 0.85rem;">
                <i class="fas fa-arrow-left me-1"></i>Back to Website
            </a>
        </div>
    </div>
</body>
</html>
